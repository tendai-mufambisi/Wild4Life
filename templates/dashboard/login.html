{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Wild4Life</title>
  <link rel="icon" href="{% static 'site/img/favicon.jpg' %}">
  <link rel="apple-touch-icon" href="{% static 'site/img/apple-touch-icon.jpg' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body class="login-body">

  <div class="login-bg-art" aria-hidden="true">
    <span class="login-bubble-1"></span>
    <span class="login-bubble-2"></span>
    <span class="login-bubble-3"></span>
  </div>

  <div class="login-card">

    <!-- Brand: real logo + site name, matching homepage style -->
    <div class="login-brand">
      <img src="{% static 'site/img/wild.jpg' %}"
           alt="Wild4Life Organisation"
           class="login-logo-img">
      <h1>Wild4Life</h1>
      <p>Staff portal &mdash; authorised access only</p>
    </div>

    {% if error %}
    <div class="login-error">
      <span class="err-icon"><i data-lucide="alert-circle"></i></span> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{% url 'donations:dashboard_login' %}">
      {% csrf_token %}

      <div class="login-field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               placeholder="your username" autocomplete="username" autofocus required>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-login">Sign in &rarr;</button>
    </form>

    <p class="login-back-link">
      <a href="{% url 'donations:home' %}">&#8592; Back to main site</a>
    </p>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
